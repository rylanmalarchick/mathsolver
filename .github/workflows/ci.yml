name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen  # run PyQt6 headless
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"  # supported range is 3.10-3.12

      # System libraries PyQt6 needs to import under the offscreen platform.
      - name: Install Qt system libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1

      - name: Install package and dev tools
        run: pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
